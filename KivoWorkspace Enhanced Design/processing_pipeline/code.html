<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pipeline Processing</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "outline-variant": "#c1c6d5",
                        "tertiary-container": "#c15600",
                        "on-background": "#1d1c16",
                        "on-tertiary-fixed-variant": "#773200",
                        "secondary-fixed-dim": "#c6c7c6",
                        "inverse-on-surface": "#f5f0e7",
                        "secondary-container": "#dfe0df",
                        "on-primary-container": "#fffeff",
                        "on-tertiary-container": "#fffeff",
                        "tertiary": "#9b4300",
                        "primary-container": "#0075de",
                        "on-secondary-fixed": "#1a1c1c",
                        "surface-dim": "#ded9d1",
                        "on-tertiary-fixed": "#331100",
                        "on-primary-fixed-variant": "#00468a",
                        "on-primary-fixed": "#001b3c",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#ffb68f",
                        "primary": "#005db2",
                        "background": "#fef9ef",
                        "error-container": "#ffdad6",
                        "on-surface": "#1d1c16",
                        "surface-variant": "#e7e2d9",
                        "tertiary-fixed": "#ffdbca",
                        "on-secondary-fixed-variant": "#454747",
                        "on-primary": "#ffffff",
                        "surface": "#fef9ef",
                        "on-secondary-container": "#616362",
                        "primary-fixed-dim": "#a8c8ff",
                        "inverse-primary": "#a8c8ff",
                        "primary-fixed": "#d5e3ff",
                        "surface-container-high": "#ede8df",
                        "surface-container-highest": "#e7e2d9",
                        "surface-tint": "#005eb4",
                        "on-tertiary": "#ffffff",
                        "secondary": "#5d5f5e",
                        "inverse-surface": "#32302a",
                        "outline": "#717784",
                        "surface-container": "#f3ede4",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f8f3ea",
                        "on-surface-variant": "#414753",
                        "on-error": "#ffffff",
                        "surface-bright": "#fef9ef",
                        "secondary-fixed": "#e2e2e2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "container_max_width": "900px",
                        "gutter": "16px",
                        "sidebar_width": "240px",
                        "block_margin": "4px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "display-title-mobile": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-title": ["Inter"],
                        "body-lg": ["Inter"],
                        "button-text": ["Inter"],
                        "label-mono": ["IBM Plex Mono"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-title-mobile": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "display-title": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["15px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "button-text": ["14px", { "lineHeight": "1", "fontWeight": "500" }],
                        "label-mono": ["12px", { "lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        .shimmer {
            background: linear-gradient(90deg, rgba(237, 232, 223, 0) 0%, rgba(237, 232, 223, 0.5) 50%, rgba(237, 232, 223, 0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .progress-bar-fill {
            transition: width 0.5s ease-in-out;
        }
        .spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center justify-center p-gutter relative overflow-hidden">
<!-- Top Navigation / Actions (Transactional Screen: Suppress Side/Bottom Nav, but keep Header Actions) -->
<header class="absolute top-0 left-0 right-0 p-gutter flex justify-between items-center w-full max-w-[container_max_width] mx-auto z-50">
<div class="flex items-center gap-unit">
<span class="font-label-mono text-label-mono font-bold tracking-tighter text-on-surface">Kivo Workspace</span>
</div>
<button aria-label="Cancel Processing" class="flex items-center gap-2 px-4 py-2 rounded font-button-text text-button-text text-on-surface hover:bg-surface-variant transition-colors border border-transparent hover:border-outline-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="close">close</span>
            Cancel Processing
        </button>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[600px] bg-surface-container-lowest rounded-xl border border-outline-variant p-8 flex flex-col gap-6 relative z-10">
<!-- Header Section -->
<div class="flex flex-col gap-2 text-center mb-4">
<h1 class="font-headline-md text-headline-md text-on-surface">Processing Pipeline</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Background processing is active. You can safely navigate away.</p>
</div>
<!-- Overall Progress -->
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-end mb-1">
<span class="font-label-mono text-label-mono text-primary font-bold">Overall Progress</span>
<span class="font-label-mono text-label-mono text-primary font-bold" id="progress-percentage">45%</span>
</div>
<div class="w-full h-2 bg-surface-variant rounded-full overflow-hidden border border-outline-variant">
<div class="h-full bg-primary progress-bar-fill rounded-full" style="width: 45%;"></div>
</div>
</div>
<hr class="border-t border-outline-variant my-2"/>
<!-- Processing Stages -->
<div class="flex flex-col gap-unit">
<h2 class="font-label-mono text-label-mono text-on-surface-variant uppercase tracking-wider mb-2">Stages</h2>
<!-- Stage 1: Completed -->
<div class="flex items-center gap-4 p-4 rounded-lg bg-surface hover:bg-surface-container transition-colors border border-outline-variant">
<div class="w-8 h-8 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined fill text-[20px]" data-icon="check_circle">check_circle</span>
</div>
<div class="flex-1 flex flex-col gap-1">
<span class="font-button-text text-button-text text-on-surface">Text Extraction</span>
<span class="font-label-mono text-label-mono text-on-surface-variant">Completed in 12s</span>
</div>
</div>
<!-- Stage 2: Active -->
<div class="flex items-center gap-4 p-4 rounded-lg bg-primary-container/10 border border-primary/30 relative overflow-hidden">
<div class="absolute inset-0 shimmer opacity-20 pointer-events-none"></div>
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined spinner text-[20px]" data-icon="progress_activity">progress_activity</span>
</div>
<div class="flex-1 flex flex-col gap-1 relative z-10">
<span class="font-button-text text-button-text text-primary">Chunking &amp; Tokenization</span>
<span class="font-label-mono text-label-mono text-primary">Processing document 14 of 42...</span>
</div>
</div>
<!-- Stage 3: Pending -->
<div class="flex items-center gap-4 p-4 rounded-lg bg-surface opacity-60 border border-outline-variant border-dashed">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center shrink-0">
<span class="font-label-mono text-label-mono">3</span>
</div>
<div class="flex-1 flex flex-col gap-1">
<span class="font-button-text text-button-text text-on-surface-variant">Vector Indexing</span>
<span class="font-label-mono text-label-mono text-on-surface-variant">Waiting...</span>
</div>
</div>
<!-- Stage 4: Pending (Skeleton) -->
<div class="flex items-center gap-4 p-4 rounded-lg bg-surface opacity-40 border border-outline-variant border-dashed">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center shrink-0">
<span class="font-label-mono text-label-mono">4</span>
</div>
<div class="flex-1 flex flex-col gap-2">
<div class="h-3 w-1/3 bg-surface-variant rounded shimmer"></div>
<div class="h-2 w-1/4 bg-surface-variant rounded shimmer"></div>
</div>
</div>
</div>
<hr class="border-t border-outline-variant my-2"/>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-4 mt-2 justify-end">
<button class="flex items-center justify-center gap-2 px-6 py-3 rounded-lg font-button-text text-button-text text-on-surface bg-surface-container border border-outline-variant hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="dashboard">dashboard</span>
                Back to Dashboard
            </button>
<button class="flex items-center justify-center gap-2 px-6 py-3 rounded-lg font-button-text text-button-text text-on-primary bg-primary hover:bg-surface-tint transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="chat_bubble">chat_bubble</span>
                Open Chat Workspace
            </button>
</div>
</main>
<!-- Decorative Background elements (Subtle) -->
<div class="absolute inset-0 pointer-events-none z-0 overflow-hidden flex items-center justify-center opacity-[0.03]">
<div class="w-[800px] h-[800px] rounded-full border border-on-background absolute"></div>
<div class="w-[600px] h-[600px] rounded-full border border-on-background absolute"></div>
<div class="w-[400px] h-[400px] rounded-full border border-on-background absolute"></div>
</div>
</body></html>
