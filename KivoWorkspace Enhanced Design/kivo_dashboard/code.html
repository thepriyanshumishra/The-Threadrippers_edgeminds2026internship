<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kivo Workspace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-error-container": "#93000a",
                      "error": "#ba1a1a",
                      "outline-variant": "#c1c6d5",
                      "tertiary-container": "#c15600",
                      "on-background": "#1d1c16",
                      "on-tertiary-fixed-variant": "#773200",
                      "secondary-fixed-dim": "#c6c7c6",
                      "inverse-on-surface": "#f5f0e7",
                      "secondary-container": "#dfe0df",
                      "on-primary-container": "#fffeff",
                      "on-tertiary-container": "#fffeff",
                      "tertiary": "#9b4300",
                      "primary-container": "#0075de",
                      "on-secondary-fixed": "#1a1c1c",
                      "surface-dim": "#ded9d1",
                      "on-tertiary-fixed": "#331100",
                      "on-primary-fixed-variant": "#00468a",
                      "on-primary-fixed": "#001b3c",
                      "surface-container-lowest": "#ffffff",
                      "tertiary-fixed-dim": "#ffb68f",
                      "primary": "#005db2",
                      "background": "#fef9ef",
                      "error-container": "#ffdad6",
                      "on-surface": "#1d1c16",
                      "surface-variant": "#e7e2d9",
                      "tertiary-fixed": "#ffdbca",
                      "on-secondary-fixed-variant": "#454747",
                      "on-primary": "#ffffff",
                      "surface": "#fef9ef",
                      "on-secondary-container": "#616362",
                      "primary-fixed-dim": "#a8c8ff",
                      "inverse-primary": "#a8c8ff",
                      "primary-fixed": "#d5e3ff",
                      "surface-container-high": "#ede8df",
                      "surface-container-highest": "#e7e2d9",
                      "surface-tint": "#005eb4",
                      "on-tertiary": "#ffffff",
                      "secondary": "#5d5f5e",
                      "inverse-surface": "#32302a",
                      "outline": "#717784",
                      "surface-container": "#f3ede4",
                      "on-secondary": "#ffffff",
                      "surface-container-low": "#f8f3ea",
                      "on-surface-variant": "#414753",
                      "on-error": "#ffffff",
                      "surface-bright": "#fef9ef",
                      "secondary-fixed": "#e2e2e2"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "container_max_width": "900px",
                      "gutter": "16px",
                      "sidebar_width": "240px",
                      "block_margin": "4px",
                      "unit": "8px"
              },
              "fontFamily": {
                      "body-md": [
                              "Inter"
                      ],
                      "display-title-mobile": [
                              "Inter"
                      ],
                      "headline-md": [
                              "Inter"
                      ],
                      "display-title": [
                              "Inter"
                      ],
                      "body-lg": [
                              "Inter"
                      ],
                      "button-text": [
                              "Inter"
                      ],
                      "label-mono": [
                              "IBM Plex Mono"
                      ]
              },
              "fontSize": {
                      "body-md": [
                              "14px",
                              {
                                      "lineHeight": "1.5",
                                      "fontWeight": "400"
                              }
                      ],
                      "display-title-mobile": [
                              "32px",
                              {
                                      "lineHeight": "1.2",
                                      "fontWeight": "700"
                              }
                      ],
                      "headline-md": [
                              "24px",
                              {
                                      "lineHeight": "1.3",
                                      "fontWeight": "600"
                              }
                      ],
                      "display-title": [
                              "40px",
                              {
                                      "lineHeight": "1.2",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ],
                      "body-lg": [
                              "15px",
                              {
                                      "lineHeight": "1.5",
                                      "fontWeight": "400"
                              }
                      ],
                      "button-text": [
                              "14px",
                              {
                                      "lineHeight": "1",
                                      "fontWeight": "500"
                              }
                      ],
                      "label-mono": [
                              "12px",
                              {
                                      "lineHeight": "1.4",
                                      "letterSpacing": "0.02em",
                                      "fontWeight": "400"
                              }
                      ]
              }
      },
          },
        }
    </script>
<style>
        /* Stealth Buttons - Warm Paper Aesthetic */
        .stealth-button {
            background-color: transparent;
            border: none;
            transition: background-color 0.15s ease-in-out;
        }
        .group:hover .stealth-button-container .stealth-button {
            opacity: 1;
        }
        .stealth-button:hover {
            background-color: rgba(55, 53, 47, 0.06);
        }
        .dark .stealth-button:hover {
            background-color: rgba(227, 226, 224, 0.06);
        }
        
        /* Shimmer Loading Effect */
        .shimmer-bg {
            background: linear-gradient(90deg, #FBFBFA 0%, #F5F0E7 50%, #FBFBFA 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        /* Focus styles for input */
        .stealth-input:focus {
            border-color: #005db2;
            box-shadow: 0 0 0 2px rgba(0, 93, 178, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md text-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-gutter h-14 sticky top-0 z-50 bg-surface/80 backdrop-blur-md border-b border-outline-variant font-body-md text-body-md">
<!-- Brand & Nav -->
<div class="flex items-center gap-6">
<span class="font-label-mono text-label-mono font-bold tracking-tighter text-on-surface">Kivo Workspace</span>
<nav class="hidden md:flex gap-6 h-full items-center">
<!-- Dashboard (Active) -->
<a class="text-primary border-b-2 border-primary pb-1 font-medium transition-opacity duration-150 opacity-80 h-full flex items-center pt-1 hover:bg-secondary-container/10" href="#">
                    Dashboard
                </a>
<!-- Inventory -->
<a class="text-on-surface-variant h-full flex items-center pt-1 hover:bg-secondary-container/10 transition-colors" href="#">
                    Inventory
                </a>
<!-- Analytics -->
<a class="text-on-surface-variant h-full flex items-center pt-1 hover:bg-secondary-container/10 transition-colors" href="#">
                    Analytics
                </a>
</nav>
</div>
<!-- Trailing Actions & Profile -->
<div class="flex items-center gap-4">
<button class="p-1.5 rounded text-on-surface-variant hover:bg-secondary-container/10 transition-colors" title="Settings">
<span class="material-symbols-outlined text-[20px]">settings</span>
</button>
<button class="p-1.5 rounded text-on-surface-variant hover:bg-secondary-container/10 transition-colors" title="Theme Toggle">
<span class="material-symbols-outlined text-[20px]">contrast</span>
</button>
<div class="w-8 h-8 rounded-full bg-surface-variant border border-outline-variant flex items-center justify-center overflow-hidden ml-2">
<img alt="User profile" class="w-full h-full object-cover" data-alt="A close-up studio portrait of a person with a neutral expression, softly lit with warm, natural-looking light against a minimal background. The aesthetic is clean, modern, and aligned with a premium, focused design system." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWtXJfdJ50ifMn6d0cSM-So8qQLqXlrh__6GmYdCf4MF7PE014N4JXvACkS41XYFGnNPQ2zQ1TtgL81pUfltMzZFgK--3UUlcEjq6340rQFOV_cthZ3oogXztfeXCcW_HXvuvjHHj1ZClPrR1Qmtehp2erm2i3auKgJuE4urWYYHnP909cZ1ncqsttuAJh8_ZjZYbDPrhacbp39WOE4ajduNX43tf4-FICT9rNBDuUlOcEB6GGpRKAyu04j6VWIOwrV0h5GW9MvzA"/>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-container_max_width mx-auto px-gutter py-8">
<!-- Search Bar -->
<div class="mb-12 max-w-2xl mx-auto relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant">search</span>
</div>
<input class="stealth-input w-full pl-10 pr-16 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-on-surface placeholder:text-on-surface-variant transition-all duration-200" placeholder="Search workspaces..." type="text"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<kbd class="font-label-mono text-[10px] text-on-surface-variant bg-surface-container border border-outline-variant rounded px-1.5 py-0.5">Ctrl+K</kbd>
</div>
</div>
<!-- Header / Actions -->
<div class="flex items-end justify-between mb-6 pb-2 border-b border-outline-variant">
<h1 class="font-headline-md text-headline-md text-on-surface">Workspaces</h1>
<button class="bg-primary text-on-primary px-4 py-2 rounded font-button-text text-button-text hover:bg-surface-tint transition-colors">
                New Workspace
            </button>
</div>
<!-- Workspace List (Bento-ish/Dense List) -->
<div class="flex flex-col gap-block_margin">
<!-- Row 1: Ready -->
<div class="group flex items-center justify-between p-4 bg-surface rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-2 h-2 rounded-full bg-primary" title="Ready"></div>
<div>
<h3 class="font-body-lg text-body-lg font-medium text-on-surface">Project Alpha</h3>
<p class="font-label-mono text-label-mono text-on-surface-variant mt-1 flex items-center gap-3">
<span>12 Sources</span>
<span class="w-[1px] h-3 bg-outline-variant"></span>
<span>4.2 MB</span>
<span class="w-[1px] h-3 bg-outline-variant"></span>
<span>Updated 2h ago</span>
</p>
</div>
</div>
<!-- Stealth Actions -->
<div class="stealth-button-container flex items-center gap-1 opacity-0 transition-opacity duration-200">
<button class="stealth-button p-1.5 rounded text-on-surface-variant" title="Open">
<span class="material-symbols-outlined text-[18px]">open_in_new</span>
</button>
<button class="stealth-button p-1.5 rounded text-on-surface-variant" title="Edit">
<span class="material-symbols-outlined text-[18px]">edit</span>
</button>
<button class="stealth-button p-1.5 rounded text-error" title="Delete">
<span class="material-symbols-outlined text-[18px]">delete</span>
</button>
</div>
</div>
<!-- Row 2: Processing -->
<div class="group flex items-center justify-between p-4 bg-surface rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors cursor-pointer">
<div class="flex items-center gap-4 w-full">
<!-- Amber Ring / Progress -->
<div class="relative w-3 h-3 flex items-center justify-center" title="Processing">
<svg class="animate-spin h-3 w-3 text-tertiary-container absolute" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
<path class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor"></path>
</svg>
</div>
<div class="flex-1">
<div class="flex items-center justify-between">
<h3 class="font-body-lg text-body-lg font-medium text-on-surface">Research Lab</h3>
<span class="font-label-mono text-[10px] text-tertiary-container">60%</span>
</div>
<div class="mt-2 w-full h-1 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-tertiary-container shimmer-bg" style="width: 60%"></div>
</div>
</div>
</div>
<!-- Stealth Actions -->
<div class="stealth-button-container flex items-center gap-1 opacity-0 transition-opacity duration-200 ml-4">
<button class="stealth-button p-1.5 rounded text-on-surface-variant" title="Cancel">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
</div>
<!-- Row 3: Error -->
<div class="group flex items-center justify-between p-4 bg-error-container/20 rounded-lg border border-error/30 hover:bg-error-container/30 transition-colors cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-2 h-2 rounded-full bg-error" title="Error"></div>
<div>
<h3 class="font-body-lg text-body-lg font-medium text-on-surface">Client Deck</h3>
<p class="font-label-mono text-label-mono text-error mt-1 flex items-center gap-2">
<span class="material-symbols-outlined text-[14px]">warning</span>
<span>Ingestion failed: timeout</span>
</p>
</div>
</div>
<!-- Stealth Actions -->
<div class="stealth-button-container flex items-center gap-1 opacity-0 transition-opacity duration-200">
<button class="stealth-button p-1.5 rounded text-on-surface-variant" title="Retry">
<span class="material-symbols-outlined text-[18px]">refresh</span>
</button>
<button class="stealth-button p-1.5 rounded text-on-surface-variant" title="Logs">
<span class="material-symbols-outlined text-[18px]">terminal</span>
</button>
<button class="stealth-button p-1.5 rounded text-error" title="Delete">
<span class="material-symbols-outlined text-[18px]">delete</span>
</button>
</div>
</div>
</div>
<!-- Pagination / Load More (Stealth) -->
<div class="mt-6 flex justify-center">
<button class="font-label-mono text-label-mono text-on-surface-variant hover:text-on-surface transition-colors py-2 px-4 rounded hover:bg-surface-container-low">
                Load more...
            </button>
</div>
</main>
</body></html>
