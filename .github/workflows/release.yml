name: Kivo Workspace Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.1.0)'
        required: false
        default: '1.1.0'

permissions:
  contents: write

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:

  # ============================================================
  # JOB 0 · Build Flutter Web Assets (Compiled Once)
  # ============================================================
  build-web:
    name: Flutter Web Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize Release Version
        shell: bash
        run: |
          RAW_VER="${{ github.event.inputs.version || github.ref_name }}"
          CLEAN_VER="${RAW_VER#v}"
          echo "VERSION=${CLEAN_VER}" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: |
          cd frontend
          flutter pub get

      - name: Build Flutter Web App
        run: |
          cd frontend
          flutter build web --release

      - name: Upload Web Assets Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kivo_web_assets
          path: frontend/build/web/
          retention-days: 1

  # ============================================================
  # JOB 1 · Windows → KivoWorkspace-Windows.exe (Standalone EXE)
  # ============================================================
  build-windows:
    name: Windows EXE
    runs-on: windows-2022
    needs: [build-web]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize Release Version
        shell: bash
        run: |
          RAW_VER="${{ github.event.inputs.version || github.ref_name }}"
          CLEAN_VER="${RAW_VER#v}"
          echo "VERSION=${CLEAN_VER}" >> $GITHUB_ENV

      - name: Clean old build files
        shell: bash
        run: |
          rm -rf backend/build backend/dist backend/web

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements_ci.txt'

      - name: Download Web Assets Artifact
        uses: actions/download-artifact@v4
        with:
          name: kivo_web_assets
          path: backend/web

      - name: Install backend dependencies & PyInstaller
        shell: pwsh
        run: |
          cd backend
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements_ci.txt
          python -m pip install pyinstaller

      - name: Build backend with PyInstaller (Windows x64)
        shell: pwsh
        run: |
          cd backend
          pyinstaller --noconfirm --onefile --noconsole `
            --name "KivoWorkspace" `
            --add-data "web;web" `
            --icon "..\frontend\windows\runner\resources\app_icon.ico" `
            --collect-all transformers `
            main.py

      - name: Rename executable
        shell: pwsh
        run: |
          Move-Item -Path "backend/dist/KivoWorkspace.exe" -Destination "KivoWorkspace-Windows-${{ env.VERSION }}.exe"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: KivoWorkspace-Windows-${{ env.VERSION }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # JOB 2 · Linux → DEB, RPM, AppImage Packages
  # ============================================================
  build-linux:
    name: Linux Packages
    runs-on: ubuntu-latest
    needs: [build-web]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize Release Version
        shell: bash
        run: |
          RAW_VER="${{ github.event.inputs.version || github.ref_name }}"
          CLEAN_VER="${RAW_VER#v}"
          echo "VERSION=${CLEAN_VER}" >> $GITHUB_ENV

      - name: Clean old build files
        shell: bash
        run: |
          rm -rf backend/build backend/dist backend/web

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements_ci.txt'

      - name: Download Web Assets Artifact
        uses: actions/download-artifact@v4
        with:
          name: kivo_web_assets
          path: backend/web

      - name: Install backend dependencies & PyInstaller
        run: |
          cd backend
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install --prefer-binary -r requirements_ci.txt
          .venv/bin/pip install pyinstaller

      - name: Build backend with PyInstaller (Linux x86_64)
        run: |
          cd backend
          .venv/bin/pyinstaller --noconfirm --onedir --noconsole \
            --name "kivo_workspace" \
            --add-data "web:web" \
            --collect-all transformers \
            main.py

      - name: Package Debian (.deb)
        run: |
          rm -rf debian
          mkdir -p debian/DEBIAN
          mkdir -p debian/usr/bin
          mkdir -p debian/usr/share/kivoworkspace
          
          # Copy compiled files
          cp -r backend/dist/kivo_workspace/* debian/usr/share/kivoworkspace/
          
          # Create launch script
          echo '#!/bin/bash' > debian/usr/bin/kivoworkspace
          echo 'exec /usr/share/kivoworkspace/kivo_workspace "$@"' >> debian/usr/bin/kivoworkspace
          chmod +x debian/usr/bin/kivoworkspace
          
          # Create control file
          echo "Package: kivoworkspace" > debian/DEBIAN/control
          echo "Version: ${{ env.VERSION }}" >> debian/DEBIAN/control
          echo "Section: utils" >> debian/DEBIAN/control
          echo "Priority: optional" >> debian/DEBIAN/control
          echo "Architecture: amd64" >> debian/DEBIAN/control
          echo "Maintainer: Priyanshu Mishra <priyanshu@kivo.ai>" >> debian/DEBIAN/control
          echo "Description: Kivo Workspace Desktop Assistant" >> debian/DEBIAN/control
          
          dpkg-deb --build debian KivoWorkspace-Linux-${{ env.VERSION }}.deb

      - name: Package RedHat (.rpm)
        run: |
          sudo apt-get update && sudo apt-get install -y alien rpm
          sudo alien --to-rpm --scripts KivoWorkspace-Linux-${{ env.VERSION }}.deb
          # Rename the generated rpm (normally named kivoworkspace-version.rpm) to standard release name
          mv *.rpm KivoWorkspace-Linux-${{ env.VERSION }}.rpm

      - name: Package AppImage (.AppImage)
        run: |
          rm -rf AppDir
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          
          # Copy compiled files to AppDir
          cp -r backend/dist/kivo_workspace/* AppDir/usr/bin/
          
          # Create AppRun entrypoint
          echo '#!/bin/sh' > AppDir/AppRun
          echo 'SELF=$(readlink -f "$0")' >> AppDir/AppRun
          echo 'HERE=$(dirname "$SELF")' >> AppDir/AppRun
          echo 'exec "$HERE/usr/bin/kivo_workspace" "$@"' >> AppDir/AppRun
          chmod +x AppDir/AppRun
          
          # Create Desktop file
          echo '[Desktop Entry]' > AppDir/kivoworkspace.desktop
          echo 'Name=Kivo Workspace' >> AppDir/kivoworkspace.desktop
          echo 'Exec=kivo_workspace' >> AppDir/kivoworkspace.desktop
          echo 'Icon=kivoworkspace' >> AppDir/kivoworkspace.desktop
          echo 'Type=Application' >> AppDir/kivoworkspace.desktop
          echo 'Categories=Utility;' >> AppDir/kivoworkspace.desktop
          
          # Use proper 256x256 app icon (not tiny favicon)
          cp frontend/macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_256.png AppDir/kivoworkspace.png || \
            cp backend/web/favicon.png AppDir/kivoworkspace.png || touch AppDir/kivoworkspace.png
          
          # Download appimagetool
          curl -L -o appimagetool-x86_64.AppImage https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir KivoWorkspace-Linux-${{ env.VERSION }}.AppImage

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            KivoWorkspace-Linux-${{ env.VERSION }}.deb
            KivoWorkspace-Linux-${{ env.VERSION }}.rpm
            KivoWorkspace-Linux-${{ env.VERSION }}.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # JOB 3 · macOS Silicon → Build & Upload DMG (arm64)
  # ============================================================
  build-macos-silicon:
    name: macOS Silicon Build
    runs-on: macos-14
    needs: [build-web]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize Release Version
        shell: bash
        run: |
          RAW_VER="${{ github.event.inputs.version || github.ref_name }}"
          CLEAN_VER="${RAW_VER#v}"
          echo "VERSION=${CLEAN_VER}" >> $GITHUB_ENV

      - name: Clean old build files
        run: |
          rm -rf backend/build backend/dist backend/web macos_silicon_app.zip

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements_ci.txt'

      - name: Download Web Assets Artifact
        uses: actions/download-artifact@v4
        with:
          name: kivo_web_assets
          path: backend/web

      - name: Install backend dependencies & PyInstaller
        run: |
          cd backend
          rm -rf .venv
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install --prefer-binary -r requirements_ci.txt
          .venv/bin/pip install pyinstaller

      - name: Generate macOS App Icon (.icns)
        run: |
          ICON_SRC="frontend/macos/Runner/Assets.xcassets/AppIcon.appiconset"
          ICONSET_DIR="AppIcon.iconset"
          rm -rf "$ICONSET_DIR"
          mkdir -p "$ICONSET_DIR"
          # Copy icon sizes into the iconset directory (sips handles scaling)
          sips -z 16   16   "$ICON_SRC/app_icon_16.png"   --out "$ICONSET_DIR/icon_16x16.png"   > /dev/null
          sips -z 32   32   "$ICON_SRC/app_icon_32.png"   --out "$ICONSET_DIR/icon_16x16@2x.png" > /dev/null
          sips -z 32   32   "$ICON_SRC/app_icon_32.png"   --out "$ICONSET_DIR/icon_32x32.png"   > /dev/null
          sips -z 64   64   "$ICON_SRC/app_icon_64.png"   --out "$ICONSET_DIR/icon_32x32@2x.png" > /dev/null
          sips -z 128  128  "$ICON_SRC/app_icon_128.png"  --out "$ICONSET_DIR/icon_128x128.png"  > /dev/null
          sips -z 256  256  "$ICON_SRC/app_icon_256.png"  --out "$ICONSET_DIR/icon_128x128@2x.png" > /dev/null
          sips -z 256  256  "$ICON_SRC/app_icon_256.png"  --out "$ICONSET_DIR/icon_256x256.png"  > /dev/null
          sips -z 512  512  "$ICON_SRC/app_icon_512.png"  --out "$ICONSET_DIR/icon_256x256@2x.png" > /dev/null
          sips -z 512  512  "$ICON_SRC/app_icon_512.png"  --out "$ICONSET_DIR/icon_512x512.png"  > /dev/null
          sips -z 1024 1024 "$ICON_SRC/app_icon_1024.png" --out "$ICONSET_DIR/icon_512x512@2x.png" > /dev/null
          iconutil -c icns "$ICONSET_DIR" -o AppIcon.icns
          echo "Generated AppIcon.icns successfully"
          ls -lh AppIcon.icns

      - name: Build backend with PyInstaller (Silicon arm64)
        run: |
          cd backend
          .venv/bin/pyinstaller --noconfirm --onedir --noconsole \
            --name "Kivo Workspace" \
            --add-data "web:web" \
            --icon "../AppIcon.icns" \
            --collect-all transformers \
            main.py

      - name: Re-sign app bundle (Ad-hoc)
        run: |
          codesign --force --deep --sign - "backend/dist/Kivo Workspace.app"

      - name: Create DMG - macOS Silicon
        run: |
          rm -rf staging_silicon KivoWorkspace-macOS-Silicon-${{ env.VERSION }}.dmg
          mkdir -p staging_silicon
          cp -R backend/dist/Kivo\ Workspace.app staging_silicon/Kivo\ Workspace.app
          ln -s /Applications staging_silicon/Applications
          hdiutil create -fs HFS+ -srcfolder staging_silicon -volname "Kivo Workspace Silicon" -format UDZO KivoWorkspace-macOS-Silicon-${{ env.VERSION }}.dmg
          rm -rf staging_silicon

      - name: Upload Silicon DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: KivoWorkspace-macOS-Silicon-${{ env.VERSION }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # JOB 4 · macOS Intel → Build & Upload DMG (x86_64 Self-Hosted)
  # ============================================================
  build-macos-intel:
    name: macOS Intel Build (Self-Hosted)
    runs-on: self-hosted
    needs: [build-web]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize Release Version
        shell: bash
        run: |
          RAW_VER="${{ github.event.inputs.version || github.ref_name }}"
          CLEAN_VER="${RAW_VER#v}"
          echo "VERSION=${CLEAN_VER}" >> $GITHUB_ENV

      - name: Clean old build files
        run: |
          rm -rf backend/build backend/dist backend/web macos_intel_app.zip

      - name: Build Web Assets Locally
        run: |
          cd frontend
          flutter pub get
          flutter build web --release
          cd ..
          rm -rf backend/web
          cp -R frontend/build/web backend/web

      - name: Install backend dependencies & PyInstaller
        run: |
          if command -v python3.12 &>/dev/null; then
            PYTHON_EXE="python3.12"
          elif command -v python3.11 &>/dev/null; then
            PYTHON_EXE="python3.11"
          elif command -v python3.10 &>/dev/null; then
            PYTHON_EXE="python3.10"
          elif command -v python3 &>/dev/null; then
            PYTHON_EXE="python3"
          else
            PYTHON_EXE="python"
          fi
          echo "Using Python: $PYTHON_EXE"
          cd backend
          rm -rf .venv
          $PYTHON_EXE -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install --prefer-binary -r requirements_ci.txt
          .venv/bin/pip install pyinstaller

      - name: Generate macOS App Icon (.icns)
        run: |
          ICON_SRC="frontend/macos/Runner/Assets.xcassets/AppIcon.appiconset"
          ICONSET_DIR="AppIcon.iconset"
          rm -rf "$ICONSET_DIR"
          mkdir -p "$ICONSET_DIR"
          sips -z 16   16   "$ICON_SRC/app_icon_16.png"   --out "$ICONSET_DIR/icon_16x16.png"   > /dev/null
          sips -z 32   32   "$ICON_SRC/app_icon_32.png"   --out "$ICONSET_DIR/icon_16x16@2x.png" > /dev/null
          sips -z 32   32   "$ICON_SRC/app_icon_32.png"   --out "$ICONSET_DIR/icon_32x32.png"   > /dev/null
          sips -z 64   64   "$ICON_SRC/app_icon_64.png"   --out "$ICONSET_DIR/icon_32x32@2x.png" > /dev/null
          sips -z 128  128  "$ICON_SRC/app_icon_128.png"  --out "$ICONSET_DIR/icon_128x128.png"  > /dev/null
          sips -z 256  256  "$ICON_SRC/app_icon_256.png"  --out "$ICONSET_DIR/icon_128x128@2x.png" > /dev/null
          sips -z 256  256  "$ICON_SRC/app_icon_256.png"  --out "$ICONSET_DIR/icon_256x256.png"  > /dev/null
          sips -z 512  512  "$ICON_SRC/app_icon_512.png"  --out "$ICONSET_DIR/icon_256x256@2x.png" > /dev/null
          sips -z 512  512  "$ICON_SRC/app_icon_512.png"  --out "$ICONSET_DIR/icon_512x512.png"  > /dev/null
          sips -z 1024 1024 "$ICON_SRC/app_icon_1024.png" --out "$ICONSET_DIR/icon_512x512@2x.png" > /dev/null
          iconutil -c icns "$ICONSET_DIR" -o AppIcon.icns
          echo "Generated AppIcon.icns successfully"
          ls -lh AppIcon.icns

      - name: Build backend with PyInstaller (Intel x86_64)
        run: |
          cd backend
          .venv/bin/pyinstaller --noconfirm --onedir --noconsole \
            --name "Kivo Workspace" \
            --add-data "web:web" \
            --icon "../AppIcon.icns" \
            --collect-all transformers \
            main.py

      - name: Re-sign app bundle (Ad-hoc)
        run: |
          codesign --force --deep --sign - "backend/dist/Kivo Workspace.app"

      - name: Create DMG - macOS Intel
        run: |
          rm -rf staging_intel KivoWorkspace-macOS-Intel-${{ env.VERSION }}.dmg
          mkdir -p staging_intel
          cp -R backend/dist/Kivo\ Workspace.app staging_intel/Kivo\ Workspace.app
          ln -s /Applications staging_intel/Applications
          hdiutil create -fs HFS+ -srcfolder staging_intel -volname "Kivo Workspace Intel" -format UDZO KivoWorkspace-macOS-Intel-${{ env.VERSION }}.dmg
          rm -rf staging_intel

      - name: Upload Intel DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: KivoWorkspace-macOS-Intel-${{ env.VERSION }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

