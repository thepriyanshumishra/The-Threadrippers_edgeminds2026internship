name: kivo_workspace
description: Kivo Workspace — Edge-first AI Knowledge Workspace
publish_to: "none"
version: 1.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Typography
  google_fonts: ^6.2.1

  # HTTP client for backend communication
  http: ^1.2.2

  # File Picker for attachments
  file_picker: ^8.0.1
  flutter_markdown: ^0.7.7+1
  markdown: ^7.2.2
  path: ^1.9.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
